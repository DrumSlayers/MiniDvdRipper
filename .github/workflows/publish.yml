name: Publish to PyPI

# Fires when you publish a GitHub Release (recommended) — tag it vX.Y.Z first.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  pypi:
    name: Upload to PyPI
    needs: build
    runs-on: ubuntu-latest
    # PyPI Trusted Publishing (OIDC) — no API token needed. Configure once at
    # https://pypi.org/manage/project/minidvdripper/settings/publishing/
    # (owner=drumslayer, repo=MiniDvdRipper, workflow=publish.yml, environment=pypi).
    environment:
      name: pypi
      url: https://pypi.org/p/minidvdripper
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        # If you prefer an API token instead of Trusted Publishing, drop the
        # `environment`/`id-token` blocks above and uncomment:
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}
